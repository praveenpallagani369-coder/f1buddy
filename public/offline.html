<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VisaBuddy — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fff7ed;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #ea580c, #f97316);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(234,88,12,0.3);
    }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    p { font-size: 15px; color: #64748b; line-height: 1.6; max-width: 300px; margin-bottom: 28px; }
    button {
      background: #ea580c; color: white;
      border: none; border-radius: 12px;
      padding: 14px 28px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 150ms;
    }
    button:hover { background: #c2410c; }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      h1 { color: #f1f5f9; }
      p { color: #94a3b8; }
    }
  </style>
</head>
<body>
  <div class="icon">✈️</div>
  <h1>You're offline</h1>
  <p>VisaBuddy needs a connection to load your data. Check your internet and try again.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
